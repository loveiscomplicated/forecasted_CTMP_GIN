device: null

edge:
  is_mi_based: True
  n_neighbors: 5
  top_k: 6
  threshold: 0.01
  pruning_ratio: 0.5
  return_edge_attr: False
  mi_cached: True

model:
  name: gin
  params:
    embedding_dim: 64
    gin_dim: 96
    gin_layer_num: 5
    train_eps: True

train:
  batch_size: 128
  learning_rate: 0.0005
  epochs: 100
  seed: 1
  binary: True
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  num_workers: 4
  optimizer: "adam"
  weight_decay: 0.0
  lr_scheduler_patience: 5
  early_stopping_patience: 10
  decision_threshold: 0.5
  ig_label: False
  cv: False
  n_folds: 5