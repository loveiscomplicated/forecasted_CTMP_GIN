admission_only: true

device: null

edge:
  is_mi_based: True
  n_neighbors: 5
  top_k: 6
  threshold: 0.0
  pruning_ratio: 0.3
  return_edge_attr: False
  mi_cached: False  # admission-only MI는 별도로 계산

model:
  name: gin
  params:
    embedding_dim: 64
    gin_dim: 96
    gin_layer_num: 4
    train_eps: True

train:
  batch_size: 128
  learning_rate: 0.00048
  epochs: 100
  seed: 1
  binary: True
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  num_workers: 3
  lr_scheduler_patience: 5
  early_stopping_patience: 10
  decision_threshold: 0.5
  optimizer: adam
  weight_decay: 0.0
  cv: False
  n_folds: 5
  ig_label: False
  do_preprocess: False
