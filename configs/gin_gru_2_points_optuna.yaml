device: null # if null, it automatically sets the available device. (cuda | mps | cpu)
            # it is often better to use cpu due to recurrent unit.
edge:
  is_mi_based: True # if 0, it generates fully connected edge index.
  n_neighbors: 1 # NOTE: cv result of n_neighbors: 3
  top_k: 9
  threshold: 0.01
  pruning_ratio: 0.5
  return_edge_attr: False # CAUTION: potential error when set to True
  mi_cached: True
  cache_path: None

model:
  name: gin_gru_2_points
  params:
    embedding_dim: 64
    gin_hidden_channel: 16
    train_eps: True
    gin_layers: 2
    gru_hidden_channel: 64
    dropout_p: 0.0393953714990199
    gin_layer_out_dropout_p: 0.2679839089614874
    gru_layer_out_dropout_p: 0.23415147693332447
    max_los_norm: 37.0  # LOS feature scaling divisor

train:
  batch_size: 512
  learning_rate: 0.0005690513428527243 # optimizer learning rate
  epochs: 100 # 
  seed: 1
  binary: True
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  optimizer: "adam"
  weight_decay: 0.00011717568860218985
  num_workers: 15
  lr_scheduler_patience: 5
  early_stopping_patience: 10
  decision_threshold: 0.5
  cv: True
  n_folds: 5