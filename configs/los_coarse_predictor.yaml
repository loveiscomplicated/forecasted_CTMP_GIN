device: null

run_name: los_coarse_predictor
los_target_mode: coarse
los_coarse_breakdown: false
num_classes: 6
los_bins:
  - [1, 1]
  - [2, 7]
  - [8, 14]
  - [15, 21]
  - [22, 28]
  - [29, 37]

model:
  name: los_coarse_predictor
  params:
    embedding_dim: 32
    hidden_dim: 256
    num_layers: 2
    dropout_p: 0.2
    activation: gelu
    norm_type: layernorm

loss:
  type: ce
  use_ce_class_weight: false
  label_smoothing: 0.0

calibration:
  enabled: true
  ece_bins: 15
  export_val_predictions: false
  export_test_predictions: true

train:
  batch_size: 1024
  learning_rate: 1.0e-3
  epochs: 50
  seed: 1
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  num_workers: 3
  lr_scheduler_patience: 5
  early_stopping_patience: 6
  optimizer: adamw
  weight_decay: 1.0e-5
  monitor_metric: valid_macro_f1
  monitor_mode: max
  do_preprocess: false
