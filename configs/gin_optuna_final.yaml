device: null # if null, it automatically sets the available device. (cuda | mps | cpu)

edge:
  is_mi_based: True # if 0, it generates fully connected edge index.
  n_neighbors: 3 # NOTE: cv result of n_neighbors: 3
  top_k: 12
  threshold: 0.005
  pruning_ratio: 0.3
  return_edge_attr: False # CAUTION: potential error when set to True
  mi_cached: True

model:
  name: gin
  params:
    embedding_dim: 32
    gin_dim: 96
    gin_layer_num: 1
    train_eps: True

train:
  batch_size: 128
  learning_rate: 0.0018782263705485944 # optimizer learning rate
  epochs: 100
  seed: 1
  binary: True
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  num_workers: 3
  lr_scheduler_patience: 5
  early_stopping_patience: 10
  decision_threshold: 0.5
  optimizer: "adamw"
  weight_decay: 4.620481564030831e-06
  cv: True
  n_folds: 5
  ig_label: False