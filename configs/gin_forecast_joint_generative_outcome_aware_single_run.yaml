device: null

run_name: gin_forecast_joint_generative_outcome_aware_single_run

joint_forecast_pipeline:
  enabled: true
  stage1:
    run_name: joint_generative_predictor
    model:
      name: joint_generative_predictor
      params:
        input_encoding: onehot
        embedding_dim: 32
        hidden_dim: 512
        latent_dim: 64
        los_context_dim: 32
        num_layers: 4
        dropout: 0.2
        z_sampling_at_eval: false
        num_eval_samples: 1
    train:
      batch_size: 1024
      learning_rate: 0.001
      epochs: 50
      num_workers: 4
      optimizer: "adamw"
      weight_decay: 1.0e-05
      lr_scheduler_patience: 5
      early_stopping_patience: 5
      do_preprocess: false
    joint_predictor:
      predictor_type: joint_generative
      los_target_mode: coarse
      lambda_los: 1.0
      prior_recon_weight: 0.5
      beta_kl_start: 0.0
      beta_kl_max: 0.001
      kl_anneal_epochs: 10
  stage2:
    enabled: true
    mode: outcome_aware
    freeze_ctmp_gin: true
    freeze_ctmp_gin_backbone: true
    train_gated_fusion: false
    train_classifier: false
    train_predictor: true
    lambda_aux: 0.1
    learning_rate: 1.0e-05
    weight_decay: 1.0e-05
    max_epochs: 30
    early_stopping_patience: 5
    selection_metric: valid_auc
    sample_prior_in_train: false
  joint_forecast_input:
    mode: distribution

edge:
  is_mi_based: true
  n_neighbors: 5
  top_k: 6
  threshold: 0.0
  pruning_ratio: 0.3
  return_edge_attr: false
  mi_cached: true

model:
  name: gin
  params:
    embedding_dim: 64
    gin_dim: 96
    gin_layer_num: 4
    train_eps: true

train:
  batch_size: 128
  learning_rate: 0.0004799804630214713
  epochs: 100
  seed: 1
  binary: true
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.2
  num_workers: 3
  lr_scheduler_patience: 5
  early_stopping_patience: 10
  decision_threshold: 0.5
  optimizer: adam
  weight_decay: 0.0
  cv: true
  n_folds: 5
  ig_label: false
  do_preprocess: false
