device: null

run_name: ctmp_gin_joint_fresh_id26_breakdown

joint_forecast_pipeline:
  enabled: true
  stage1:
    run_name: joint_consistent_predictor
    model:
      name: joint_consistent_predictor
      params:
        input_encoding: onehot
        embedding_dim: 32
        hidden_dim: 512
        latent_dim: 64
        los_context_dim: 32
        num_layers: 4
        dropout: 0.2
        conditioner_embedding_dim: null
        z_sampling_at_eval: false
        num_eval_samples: 1
    train:
      batch_size: 1024
      learning_rate: 0.001
      epochs: 50
      num_workers: 4
      optimizer: "adamw"
      weight_decay: 1.0e-05
      lr_scheduler_patience: 5
      early_stopping_patience: 5
      do_preprocess: false
    joint_predictor:
      predictor_type: joint_consistent
      joint_direction: d_to_los
      condition_mode: predicted
      detach_condition: false
      los_target_mode: coarse
      los_coarse_breakdown: true
      lambda_los: 1.0
      lambda_aux: 0.3
      lambda_joint: 0.3
      prior_recon_weight: 0.5
      beta_kl_start: 0.0
      beta_kl_max: 0.001
      kl_anneal_epochs: 10
      joint_heads: SERVICES_D,FREQ_ATND_SELF_HELP_D,SUB1_D
      num_classes: 9
  joint_forecast_input:
    mode: distribution

edge:
  is_mi_based: true
  n_neighbors: 3
  top_k: 9
  threshold: 0.02
  pruning_ratio: 0.5
  return_edge_attr: false
  mi_cached: false

model:
  name: ctmp_gin
  params:
    embedding_dim: 16
    forecast_input_encoder: distribution
    distribution_encoder_hidden_dim: 64
    distribution_encoder_out_dim: 16
    gin_hidden_channel: 96
    gin_1_layers: 2
    gin_hidden_channel_2: 96
    gin_2_layers: 2
    train_eps: true
    los_embedding_dim: 4
    gate_hidden_ch: 64
    dropout_p: 0.1242026370635674
    readout_mode: "concat"
    los_emb: embedding
    los_ordinal_basis_dim: 8
    los_ordinal_dim: 8
    los_ordinal_hidden_dim: 32

train:
  batch_size: 512
  learning_rate: 0.0006103193737231391
  epochs: 100
  seed: 1
  binary: true
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.2
  num_workers: 4
  optimizer: "adam"
  weight_decay: 1.1058007626429544e-05
  lr_scheduler_patience: 5
  early_stopping_patience: 10
  decision_threshold: 0.5
  ig_label: false
  do_preprocess: false
  cv: true
  n_folds: 5
