admission_only: true

device: null

model:
  name: mlp
  params:
    embedding_dim: 32
    hidden_dim: 256
    num_layers: 3
    dropout: 0.1

train:
  batch_size: 128
  learning_rate: 0.001
  epochs: 100
  seed: 1
  binary: True
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  num_workers: 3
  lr_scheduler_patience: 5
  early_stopping_patience: 10
  decision_threshold: 0.5
  optimizer: adam
  weight_decay: 0.0
  cv: False
  n_folds: 5
  ig_label: False
  do_preprocess: False
